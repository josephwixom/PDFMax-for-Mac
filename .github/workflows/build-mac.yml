name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install all workspace dependencies
        run: npm install --ignore-scripts

      - name: Build workspace packages
        run: |
          cd packages/shared && npx tsc -p tsconfig.json || true
          cd ../../packages/pdf-engine && npx tsc -p tsconfig.json || true

      - name: Build Next.js static export
        run: |
          cd apps/web
          ELECTRON=1 npm run build

      - name: Download and install Electron binary
        run: |
          ELECTRON_PKG=$(node -e "process.stdout.write(require('path').dirname(require.resolve('electron/package.json')))")
          echo "Electron pkg: $ELECTRON_PKG"
          VERSION=$(node -e "console.log(require('$ELECTRON_PKG/package.json').version)")
          echo "Electron version: $VERSION"
          curl -fsSL \
            "https://github.com/electron/electron/releases/download/v${VERSION}/electron-v${VERSION}-darwin-arm64.zip" \
            -o /tmp/electron-darwin-arm64.zip
          unzip -o /tmp/electron-darwin-arm64.zip -d "$ELECTRON_PKG"
          echo "Electron.app/Contents/MacOS/Electron" > "$ELECTRON_PKG/path.txt"
          ls "$ELECTRON_PKG/Electron.app/Contents/MacOS/"

      - name: Compile Electron TypeScript
        run: |
          cd apps/desktop
          npx tsc -p tsconfig.json
          ls dist-electron/

      - name: Locate Electron.app
        id: locate_electron
        run: |
          ELECTRON_PKG=$(node -e "process.stdout.write(require('path').dirname(require.resolve('electron/package.json')))")
          echo "Electron pkg dir: $ELECTRON_PKG"
          ELECTRON_APP="$ELECTRON_PKG/Electron.app"
          echo "Electron.app path: $ELECTRON_APP"
          ls "$ELECTRON_APP/Contents/MacOS/"
          echo "electron_app=$ELECTRON_APP" >> $GITHUB_OUTPUT

      - name: Copy Electron.app to output dir
        run: |
          ELECTRON_APP="${{ steps.locate_electron.outputs.electron_app }}"
          OUT="apps/desktop/dist/mac-arm64/PDF Max.app"
          mkdir -p "apps/desktop/dist/mac-arm64"
          rm -rf "$OUT"
          cp -R "$ELECTRON_APP" "$OUT"
          echo "✓ Copied Electron.app to: $OUT"
          ls "$OUT/Contents/MacOS/"

      - name: Rename Electron executable
        run: |
          mv "apps/desktop/dist/mac-arm64/PDF Max.app/Contents/MacOS/Electron" \
             "apps/desktop/dist/mac-arm64/PDF Max.app/Contents/MacOS/PDF Max"
          echo "✓ Renamed to 'PDF Max'"

      - name: Write Info.plist
        run: |
          cat > "apps/desktop/dist/mac-arm64/PDF Max.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key><string>PDF Max</string>
            <key>CFBundleExecutable</key><string>PDF Max</string>
            <key>CFBundleIdentifier</key><string>com.pdfmax.desktop</string>
            <key>CFBundleName</key><string>PDF Max</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
            <key>NSRequiresAquaSystemAppearance</key><false/>
          </dict>
          </plist>
          PLIST
          echo "✓ Info.plist written"

      - name: Copy Electron main process
        run: |
          APP="apps/desktop/dist/mac-arm64/PDF Max.app"
          mkdir -p "$APP/Contents/Resources/app"
          cp -R apps/desktop/dist-electron "$APP/Contents/Resources/app/"
          cp apps/desktop/package.json     "$APP/Contents/Resources/app/"
          echo "✓ Copied dist-electron + package.json"

      - name: Copy web static export
        run: |
          APP="apps/desktop/dist/mac-arm64/PDF Max.app"
          mkdir -p "$APP/Contents/Resources/app-web"
          cp -R apps/web/out/. "$APP/Contents/Resources/app-web/"
          echo "✓ Copied web out → Resources/app-web"
          ls "$APP/Contents/Resources/app-web/" | head -10

      - name: Create DMG installer
        run: |
          APP="apps/desktop/dist/mac-arm64/PDF Max.app"
          STAGING="/tmp/pdfmax-dmg-staging"
          rm -rf "$STAGING" && mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          mkdir -p apps/desktop/dist
          hdiutil makehybrid -hfs \
            -hfs-volume-name "PDF Max" \
            -o apps/desktop/dist/PDF-Max-arm64.dmg \
            "$STAGING"
          ls -lh apps/desktop/dist/PDF-Max-arm64.dmg

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Max-dmg
          path: apps/desktop/dist/PDF-Max-arm64.dmg
          retention-days: 30

      - name: Publish GitHub Release with DMG
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/PDF-Max-arm64.dmg
          name: PDF Max ${{ github.ref_name }}
          body: |
            ## PDF Max ${{ github.ref_name }}

            Professional PDF annotation tool for macOS (Apple Silicon arm64).

            ### Install
            1. Download **PDF-Max-arm64.dmg** below
            2. Open the DMG — drag **PDF Max** to your Applications folder
            3. First launch: **right-click → Open** (bypass Gatekeeper for unsigned app)

            ### Features
            - Annotation suite: rectangles, callout clouds, arrows, freehand, text
            - Measurement tools (length, area, perimeter, count) with calibration
            - Vector snap engine (endpoint, intersection, midpoint, grid)
            - OCR, DXF import, PDF export with flattened annotations
            - Native macOS menus and file dialogs
            - Undo/redo per page, layer management
          draft: false
          prerelease: false
